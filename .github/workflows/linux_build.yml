name: Linux VST3 Build

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-linux-vst3:
    runs-on: ubuntu-24.04

    strategy:
      matrix:
        include:
          - name: "Generic"
            compiler_flags: ""
          - name: "AVX2"
            compiler_flags: "-mavx2"

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential ninja-build cmake \
             libasound2-dev libx11-dev libxinerama-dev libxext-dev \
             libfreetype6-dev libwebkit2gtk-4.1-dev libglu1-mesa-dev \
             libxrandr-dev libxcursor-dev curl libcurl4-openssl-dev \
             libfontconfig1-dev python3 pkg-config \
             libharfbuzz-dev libpng-dev libjpeg-dev \
             qtbase5-dev qt5-qmake qtbase5-dev-tools

    # -------------------------------------------------------------------
    # Build SDL3, SDL3_ttf, SDL3_image from source into ./sdl3-install.
    # Ubuntu 24.04 apt has no SDL3 packages.
    # We cache the install directory (small: ~10 MB) not /usr/local.
    # -------------------------------------------------------------------
    - name: Restore SDL3 cache
      id: cache-sdl3
      uses: actions/cache/restore@v4
      with:
        path: sdl3-install
        key: sdl3-ubuntu24-3.2.10

    - name: Build SDL3 from source
      if: steps.cache-sdl3.outputs.cache-hit != 'true'
      run: |
        git clone --depth 1 --branch release-3.2.10 \
          https://github.com/libsdl-org/SDL.git sdl3-src
        cmake -S sdl3-src -B sdl3-build \
              -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_INSTALL_PREFIX=$GITHUB_WORKSPACE/sdl3-install \
              -DSDL_SHARED=ON -DSDL_STATIC=OFF
        cmake --build sdl3-build -j$(nproc)
        cmake --install sdl3-build

    - name: Build SDL3_ttf from source
      if: steps.cache-sdl3.outputs.cache-hit != 'true'
      run: |
        git clone --depth 1 --branch release-3.2.2 \
          https://github.com/libsdl-org/SDL_ttf.git sdl3_ttf-src
        cmake -S sdl3_ttf-src -B sdl3_ttf-build \
              -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_INSTALL_PREFIX=$GITHUB_WORKSPACE/sdl3-install \
              -DSDLTTF_SHARED=ON -DSDLTTF_STATIC=OFF \
              -DSDLTTF_VENDORED=OFF
        cmake --build sdl3_ttf-build -j$(nproc)
        cmake --install sdl3_ttf-build

    - name: Build SDL3_image from source
      if: steps.cache-sdl3.outputs.cache-hit != 'true'
      run: |
        git clone --depth 1 --branch release-3.2.4 \
          https://github.com/libsdl-org/SDL_image.git sdl3_image-src
        cmake -S sdl3_image-src -B sdl3_image-build \
              -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_INSTALL_PREFIX=$GITHUB_WORKSPACE/sdl3-install \
              -DSDLIMAGE_SHARED=ON -DSDLIMAGE_STATIC=OFF \
              -DSDLIMAGE_VENDORED=OFF
        cmake --build sdl3_image-build -j$(nproc)
        cmake --install sdl3_image-build

    - name: Save SDL3 cache
      if: steps.cache-sdl3.outputs.cache-hit != 'true'
      uses: actions/cache/save@v4
      with:
        path: sdl3-install
        key: sdl3-ubuntu24-3.2.10

    # Export SDL3 paths for all subsequent steps
    - name: Export SDL3 paths
      run: |
        echo "SDL3_PREFIX=$GITHUB_WORKSPACE/sdl3-install" >> $GITHUB_ENV
        echo "PKG_CONFIG_PATH=$GITHUB_WORKSPACE/sdl3-install/lib/pkgconfig:$PKG_CONFIG_PATH" >> $GITHUB_ENV
        echo "LD_LIBRARY_PATH=$GITHUB_WORKSPACE/sdl3-install/lib:$LD_LIBRARY_PATH" >> $GITHUB_ENV

    # -------------------------------------------------------------------
    # MAME cache: restore first, save immediately after compile.
    # -------------------------------------------------------------------
    - name: Restore MAME cache
      id: cache-mame
      uses: actions/cache/restore@v4
      with:
        path: mame
        key: mame-0286-${{ matrix.name }}-${{ hashFiles('Mame_Patches/**') }}

    - name: Clone MAME v0.286
      if: steps.cache-mame.outputs.cache-hit != 'true'
      run: |
        git clone --depth 1 --branch mame0286 \
          https://github.com/mamedev/mame.git mame

    - name: Clone JUCE 8.0.12
      run: |
        git clone --depth 1 --branch 8.0.12 \
          https://github.com/juce-framework/JUCE.git juce

    - name: Apply MAME patches
      if: steps.cache-mame.outputs.cache-hit != 'true'
      run: |
        cp Mame_Patches/esq5505.cpp mame/src/devices/sound/esq5505.cpp
        cp Mame_Patches/ui.cpp      mame/src/frontend/mame/ui/ui.cpp
        cp Mame_Patches/sd132.lay   mame/src/mame/layout/sd132.lay

    - name: Compile MAME sd132 (${{ matrix.name }})
      if: steps.cache-mame.outputs.cache-hit != 'true'
      run: |
        cd mame
        make SUBTARGET=sd132 SOURCES=src/mame/ensoniq/esq5505.cpp \
             OSD=sdl3 USE_QTDEBUG=0 REGENIE=1 NO_USE_BGFX=1 \
             SDL_INSTALL_ROOT=${{ env.SDL3_PREFIX }} \
             OPT_FLAGS="${{ matrix.compiler_flags }}" -j$(nproc)

    - name: Save MAME cache
      if: steps.cache-mame.outputs.cache-hit != 'true'
      uses: actions/cache/save@v4
      with:
        path: mame
        key: mame-0286-${{ matrix.name }}-${{ hashFiles('Mame_Patches/**') }}

    - name: Build Projucer
      run: |
        cd juce/extras/Projucer/Builds/LinuxMakefile
        make CONFIG=Release -j$(nproc)

    - name: Patch .jucer for CI
      run: |
        # useGlobalPath="1" -> "0": use local MODULEPATH entries
        sed -i 's/useGlobalPath="1"/useGlobalPath="0"/g' EnsoniqSD1-LINUX.jucer
        # Repoint all MODULEPATH entries to our cloned juce/
        sed -i 's|<MODULEPATH id="\([^"]*\)" path="[^"]*"/>|<MODULEPATH id="\1" path="juce/modules"/>|g' EnsoniqSD1-LINUX.jucer
        # VST3 only — no Standalone, no AU
        sed -i 's/pluginFormats="[^"]*"/pluginFormats="buildVST3"/' EnsoniqSD1-LINUX.jucer
        # Remove qtdbg_sdl3 (only needed when USE_QTDEBUG=1)
        sed -i 's/qtdbg_sdl3&#10;//g' EnsoniqSD1-LINUX.jucer
        echo "Patched values:"
        grep -E 'useGlobalPath|MODULEPATH|pluginFormats|externalLibraries' EnsoniqSD1-LINUX.jucer | head -20

    - name: Regenerate JuceLibraryCode via Projucer
      run: |
        juce/extras/Projucer/Builds/LinuxMakefile/build/Projucer \
          --resave EnsoniqSD1-LINUX.jucer
        echo "JuceLibraryCode contents:"
        ls -l JuceLibraryCode/

    - name: Compile JUCE VST3 (${{ matrix.name }})
      run: |
        cd Builds/LinuxMakefile
        # SDL3 headers and libs are in sdl3-install — pass to Makefile.
        # Do NOT pass JUCE_CPPFLAGS or JUCE_CXXFLAGS (drops forced-include).
        make CONFIG=Release \
             CXXFLAGS="${{ matrix.compiler_flags }} -I${{ env.SDL3_PREFIX }}/include" \
             LDFLAGS="-L${{ env.SDL3_PREFIX }}/lib -Wl,-rpath,${{ env.SDL3_PREFIX }}/lib" \
             -j$(nproc)

    - name: Upload VST3 artifact (${{ matrix.name }})
      uses: actions/upload-artifact@v4
      with:
        name: Ensoniq_SD1_Linux_VST3_${{ matrix.name }}
        path: Builds/LinuxMakefile/build/*.vst3
