name: Linux VST3 Build

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-linux-vst3:
    runs-on: ubuntu-24.04

    strategy:
      matrix:
        include:
          - name: "Generic"
            compiler_flags: ""
          - name: "AVX2"
            compiler_flags: "-mavx2"

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential ninja-build \
             libasound2-dev libx11-dev libxinerama-dev libxext-dev \
             libfreetype6-dev libwebkit2gtk-4.1-dev libglu1-mesa-dev \
             libxrandr-dev libxcursor-dev curl libcurl4-openssl-dev \
             libsdl2-dev libsdl2-ttf-dev libfontconfig1-dev python3 pkg-config \
             qtbase5-dev qt5-qmake qtbase5-dev-tools

    - name: Create Extra Swap Space
      run: |
        sudo fallocate -l 8G /swapfile_extra
        sudo chmod 600 /swapfile_extra
        sudo mkswap /swapfile_extra
        sudo swapon /swapfile_extra
        free -m

    - name: Install SDL3
      uses: libsdl-org/setup-sdl@main
      id: sdl
      with:
        version: 3-latest
        version-sdl-ttf: 3-latest
        version-sdl-image: 3-latest

    # -------------------------------------------------------------------
    # MAME cache: restore first, save immediately after compile.
    # -------------------------------------------------------------------
    - name: Restore MAME cache
      id: cache-mame
      uses: actions/cache/restore@v4
      with:
        path: mame
        key: mame-0286-v2-${{ matrix.name }}-${{ hashFiles('Mame_Patches/**') }}

    - name: Clone MAME v0.286
      if: steps.cache-mame.outputs.cache-hit != 'true'
      run: |
        git clone --depth 1 --branch mame0286 https://github.com/mamedev/mame.git mame

    - name: Clone JUCE 8.0.12
      run: |
        git clone --depth 1 --branch 8.0.12 https://github.com/juce-framework/JUCE.git juce

    - name: Apply MAME patches
      if: steps.cache-mame.outputs.cache-hit != 'true'
      run: |
        cp Mame_Patches/esq5505.cpp mame/src/devices/sound/esq5505.cpp
        cp Mame_Patches/ui.cpp      mame/src/frontend/mame/ui/ui.cpp
        cp Mame_Patches/sd132.lay   mame/src/mame/layout/sd132.lay
        ls -l mame/src/devices/sound/esq5505.cpp \
              mame/src/frontend/mame/ui/ui.cpp \
              mame/src/mame/layout/sd132.lay

    - name: Compile MAME sd132 (${{ matrix.name }})
      if: steps.cache-mame.outputs.cache-hit != 'true'
      run: |
        cd mame
        export PKG_CONFIG_PATH=${{ steps.sdl.outputs.prefix }}/lib/pkgconfig:$PKG_CONFIG_PATH
        make SUBTARGET=sd132 SOURCES=src/mame/ensoniq/esq5505.cpp \
             OSD=sdl3 \
             USE_QTDEBUG=0 REGENIE=1 NO_USE_BGFX=1 \
             OPT_FLAGS="${{ matrix.compiler_flags }}" -j$(nproc)

    - name: Save MAME cache
      if: steps.cache-mame.outputs.cache-hit != 'true'
      uses: actions/cache/save@v4
      with:
        path: mame
        key: mame-0286-v2-${{ matrix.name }}-${{ hashFiles('Mame_Patches/**') }}

    - name: Build Projucer
      run: |
        cd juce/extras/Projucer/Builds/LinuxMakefile
        make CONFIG=Release -j$(nproc)

    # -------------------------------------------------------------------
    # Patch the .jucer before --resave to fix two issues that can't be
    # reliably committed from a developer machine:
    #
    # 1. useGlobalPath="1" -> "0": tells Projucer to use the MODULEPATH
    #    entries rather than looking up a local settings file that doesn't
    #    exist on the runner.
    #
    # 2. MODULEPATH path="..." -> "juce/modules": paths must be relative
    #    to the .jucer file location (repo root). Whatever path the
    #    developer had on their machine is replaced with the correct value
    #    pointing at our freshly cloned juce/ directory.
    #
    # 3. pluginFormats: strip buildStandalone and buildAU — Standalone
    #    requires extra SDL3 link targets we don't need, AU is macOS-only.
    # -------------------------------------------------------------------
    - name: Patch .jucer for CI
      run: |
        # Fix 1: use local module paths, not global Projucer settings
        sed -i 's/useGlobalPath="1"/useGlobalPath="0"/g' EnsoniqSD1-LINUX.jucer

        # Fix 2: repoint all MODULEPATH entries to our cloned juce/
        sed -i 's|<MODULEPATH id="\([^"]*\)" path="[^"]*"/>|<MODULEPATH id="\1" path="juce/modules"/>|g' EnsoniqSD1-LINUX.jucer

        # Fix 3: VST3 only — remove Standalone and AU targets
        sed -i 's/pluginFormats="[^"]*"/pluginFormats="buildVST3"/' EnsoniqSD1-LINUX.jucer
        
        # Fix 4: Remove qtdbg_sdl3 from externalLibraries since USE_QTDEBUG=0
        sed -i 's/qtdbg_sdl3&#10;//g' EnsoniqSD1-LINUX.jucer

        echo "Patched values:"
        grep -E 'useGlobalPath|MODULEPATH|pluginFormats|externalLibraries' EnsoniqSD1-LINUX.jucer | head -20

    - name: Regenerate JuceLibraryCode via Projucer
      run: |
        juce/extras/Projucer/Builds/LinuxMakefile/build/Projucer \
          --resave EnsoniqSD1-LINUX.jucer
        echo "JuceLibraryCode contents:"
        ls -l JuceLibraryCode/

    - name: Compile JUCE VST3 (${{ matrix.name }})
      run: |
        cd Builds/LinuxMakefile

        # SDL3 is installed into a custom prefix by setup-sdl.
        export PKG_CONFIG_PATH=${{ steps.sdl.outputs.prefix }}/lib/pkgconfig:$PKG_CONFIG_PATH
        export LDFLAGS="-L${{ steps.sdl.outputs.prefix }}/lib"

        # CXXFLAGS appends the AVX2 flag (empty for Generic).
        # Do NOT pass JUCE_CPPFLAGS or JUCE_CXXFLAGS — overriding those
        # variables drops the Makefile's forced -include JuceHeader.h and
        # MAME header paths, causing "No global header file" and emu.h errors.
        make CONFIG=Release \
             CXXFLAGS="${{ matrix.compiler_flags }}" \
             LDFLAGS="$LDFLAGS" \
             -j$(nproc)

    - name: Upload VST3 artifact (${{ matrix.name }})
      uses: actions/upload-artifact@v4
      with:
        name: Ensoniq_SD1_Linux_VST3_${{ matrix.name }}
        path: Builds/LinuxMakefile/build/*.vst3
